name: Sync LinkedIn Profile

on:
  schedule:
    - cron: '0 8 * * 1'      # Every Monday 08:00 UTC
  workflow_dispatch:          # Manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch profile from LinkedIn
        env:
          LINKEDIN_LI_AT:        ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID:   ${{ secrets.LINKEDIN_JSESSIONID }}
          LINKEDIN_PROFILE_ID:   ${{ vars.LINKEDIN_PROFILE_ID || 'kailash-parshad' }}
        run: python scripts/sync_linkedin.py

      - name: Commit and push updated JSON
        run: |
          git config user.name  "at0m-b0mb"
          git config user.email "99875896+at0m-b0mb@users.noreply.github.com"
          if git diff --quiet -- '*.json'; then
            echo "No profile changes since last run."
          else
            git add profile.json experience.json
            git commit -m "chore: sync LinkedIn profile [skip ci]"
            git push
          fi
